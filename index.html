<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1XBET IA 🤖⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold-light: #FFE97A;
    --gold-dark: #B8860B;
    --black: #0A0A0A;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #222222;
    --text: #F0E6C8;
    --text-dim: #A09070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'Outfit', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: var(--text);
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,215,0,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 90%, rgba(184,134,11,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    background: linear-gradient(180deg, #0A0A0A 0%, rgba(10,10,10,0.95) 100%);
    border-bottom: 1px solid rgba(255,215,0,0.2);
    padding: 18px 20px 14px;
    text-align: center;
    flex-shrink: 0;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(184,134,11,0.1));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50px;
    padding: 3px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 500;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(14px, 4vw, 22px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    line-height: 1.3;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* Online indicator */
  .online {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    font-size: 11px;
    color: #4CAF50;
  }
  .online-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4CAF50;
    animation: pulse-green 2s infinite;
  }
  @keyframes pulse-green {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* Messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 2px; }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
    max-width: 85%;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    border: 1px solid rgba(255,215,0,0.3);
  }
  .msg.bot .avatar {
    background: linear-gradient(135deg, #1A1500, #2A2000);
  }
  .msg.user .avatar {
    background: linear-gradient(135deg, #1A1A1A, #2A2A2A);
    font-size: 13px;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 400;
  }

  .msg.bot .bubble {
    background: linear-gradient(135deg, #1C1800, #1A1600);
    border: 1px solid rgba(255,215,0,0.15);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, var(--gold-dark), #8B6914);
    border: 1px solid rgba(255,215,0,0.3);
    border-top-right-radius: 4px;
    color: #000;
    font-weight: 500;
  }

  /* Highlight KIMI70 */
  .bubble strong, .bubble b {
    color: var(--gold);
    font-weight: 700;
  }
  .msg.user .bubble strong, .msg.user .bubble b {
    color: #000;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.7;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  footer {
    position: relative;
    z-index: 10;
    background: var(--dark);
    border-top: 1px solid rgba(255,215,0,0.15);
    padding: 14px 16px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--dark2);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 24px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within {
    border-color: rgba(255,215,0,0.5);
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    padding: 4px 0;
  }
  #input::placeholder { color: var(--text-dim); }

  #send {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
    font-size: 16px;
  }
  #send:hover { transform: scale(1.08); }
  #send:active { transform: scale(0.95); }
  #send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Suggestions */
  .suggestions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .suggestion-btn {
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    color: var(--gold);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .suggestion-btn:hover {
    background: rgba(255,215,0,0.15);
  }
</style>
</head>

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🪄';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  document.getElementById('suggestions').style.display = 'none';
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 300,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          ...history
        ]
      })
    });

    const data = await response.json();
    const reply = data?.choices?.[0]?.message?.content || "Désolée, une erreur s'est produite. Réessaie ! 🪄";

    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage('bot', reply);
  } catch (err) {
    removeTyping();
    addMessage('bot', "Oups ! Problème de connexion. Réessaie dans quelques secondes. 🪄");
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// Auto-resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Send on Enter (Shift+Enter = new line)
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
